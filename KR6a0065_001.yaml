body:
  text: 西晉沙門法炬譯聞如是一時婆加婆在舍衛城祇樹給孤獨園彼時居士阿那邠祁至世尊所到已禮世尊足却住一面阿那邠祁居士却住一面已白世尊曰唯世尊世間有幾伏淫而可知者汝居士世間有十伏淫云何為十此居士或一伏淫非法行淫干彼非法求淫干無所方便為苦已亦不自安身亦不安父母及妻子客使奴婢沙門婆羅門不有益事為善得善得生天上如是居士是一伏淫復次居士或一伏淫非法求淫干彼非法求淫干已自安身父母妻子客使奴婢而不施沙門婆羅門為善得善身生善處如是居士是一伏淫復次居士或一伏淫非法求干彼非法求干已自安隱身父母妻子客使奴婢能施沙門婆羅門為善得善身生善處如是居士是一伏淫復次居士或一伏淫如法求財彼如法求財已不自安樂身不為父母不為妻子不為奴婢亦不施沙門婆羅門為善得善身生善處如是居士是一伏淫復次居士或一伏淫如法求財彼如法求財已而自安樂身及父母妻子奴婢不施與沙門婆羅門為善得善身生善處如是居士是一伏淫復次居士或一伏淫如法求財彼如法求財已而自安樂身及父母妻子奴婢施與沙門婆羅門為善得善身生善處如是居士是一伏淫復次居士或一伏淫如法求財不干彼如法求財不干已亦不自安樂身亦不為父母妻子奴婢亦不施與沙門婆羅門為善得善身生善處如是居士是一伏淫復次居士或一伏淫如法求財不干彼如法求財不干已自得安樂身及父母妻子奴婢不施與沙門婆羅門為善得善身生善處如是居士是一伏淫復次居士或一伏淫如法求財不干彼如法求財不干已自得安樂身及父母妻子奴婢施與沙門婆羅門為善得善身生善處彼得錢財於中染著極染著不見禍變亦不知棄而貪食之如是居士是一伏淫復次居士或一伏淫如法求錢財不干彼如法求錢財不干已自得安隱身及父母妻子奴婢施與沙門婆羅門為善得善身生善處彼得錢財亦不染亦不著亦不於中樂亦不於中住亦知是禍變亦能棄捨而食之如是居士是一伏淫此居士彼或一伏淫非法求錢財干彼非法求錢財干已亦不自安隱身亦不安隱父母妻子奴婢亦不施與沙門婆羅門為善得善身生善處是為居士如是伏淫伏淫我說此弊惡此居士或一伏淫非法求錢財干彼非法求錢財干已自安隱身及父母妻子奴婢不施與沙門婆羅門為善得善身生善處此居士此伏淫此伏淫此小勝小勝此居士彼或一伏淫如法求錢財不干彼如法求錢財不干已自得安樂身及父母妻子奴婢施與沙門婆羅門為善得善身生善處彼得錢財不染不著不持不樂知是禍變棄捨離而食之如是居士食淫最勝最妙最上最好無上勝猶若居士有牛乳因乳有酪因酪有醍醐因醍醐有酥因酥有酪酥此是最勝最妙無上說如是居士此諸伏淫如是伏淫最勝最妙極妙最上無上無上說頌偈曰非法聚錢財如法如法施不施不食之亦不施為福二俱為慳濁惡行食此淫如法求錢財欲以施為福亦施及食之亦能作福德二俱不慳濁皆有此伏淫有能行智慧伏淫隨所行知變有知足知足而食之有能行智慧最妙能伏淫佛如是說居士阿那邠祁聞世尊所說歡喜而樂
